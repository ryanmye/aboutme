positions:
  - title: "MABe25 - Animal Behavior Benchmark"
    role: "Undergraduate Researcher"
    lab: "Sun Lab (PI: Jennifer Sun)"
    institution: "Cornell University"
    date: "Fall 2025 - Present"
    description: |
      Benchmarking video-based AI models for classifying animal behavior
      across 16 research labs as part of the MABe25 competition.
    focus:
      - title: "Large-scale video understanding"
        detail: "evaluating whether pretrained video transformers (VideoMAE2, VideoPrism) can generalize to specialized behavioral science data across diverse lab settings"
      - title: "Multi-lab benchmark infrastructure"
        detail: "a dataset spanning 16 labs with varied recording conditions, designed to test model robustness for real-world scientific use"

  - title: "AI for Animal Behavior Monitoring - Project accepted to ADSA 2026 Poster!"
    role: "Undergraduate Researcher"
    lab: "Sun Lab (PI: Jennifer Sun)"
    institution: "Cornell University"
    date: "May 2025 - Present"
    description: |
      Building scalable computer vision systems for analyzing dairy calf behavior in
      agricultural environments, supporting veterinary researchers studying early
      indicators of disease and welfare.
    focus:
      - title: "Self-supervised vision for livestock monitoring"
        detail: "a pipeline using DINOv3 features and YOLOv11 detection to classify calf posture from farm camera footage with limited labeled data"
      - title: "Bridging AI and veterinary research"
        detail: "an interactive Jupyter workflow enabling everyone to run experiments and interpret results"
      - title: "Paper: \"Automating pose detection in calves: a computer vision framework for non-invasive behavioral monitoring.\""
        detail: "Accepted to ADSA 2026 — thank you to all my advisors!"
    note: "Conducted as part of the Bowers Undergraduate Research Experience (BURE) with support from a CIDA grant."
