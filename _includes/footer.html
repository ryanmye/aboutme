<footer class="site-footer" role="contentinfo">
  <div class="container footer-inner">
    <p class="footer-copy">
      &copy; {{ 'now' | date: "%Y" }} {{ site.author }}. Built with
      <a href="https://jekyllrb.com" target="_blank" rel="noopener noreferrer">Jekyll</a>.
    </p>
    <nav class="footer-links" aria-label="Social links">
      <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a href="mailto:{{ site.email }}">Email</a>
    </nav>
  </div>
</footer>
