<nav class="site-nav" role="navigation" aria-label="Main navigation">
  <div class="container nav-inner">
    <a class="nav-brand" href="{{ '/' | relative_url }}">{{ site.author }}</a>

    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-links">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="nav-links" id="nav-links" role="list">
      <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a></li>
      <li><a href="{{ '/about' | relative_url }}"{% if page.url contains '/about' %} class="active"{% endif %}>About</a></li>
      <li><a href="{{ '/projects' | relative_url }}"{% if page.url contains '/projects' %} class="active"{% endif %}>Projects</a></li>
      <li><a href="{{ '/research' | relative_url }}"{% if page.url contains '/research' %} class="active"{% endif %}>Research</a></li>
      <li><a href="{{ '/blog' | relative_url }}"{% if page.url contains '/blog' %} class="active"{% endif %}>Blog</a></li>
      <li><a href="{{ '/resume' | relative_url }}"{% if page.url contains '/resume' %} class="active"{% endif %}>Resume</a></li>
    </ul>
  </div>
</nav>

<script>
  (function () {
    var toggle = document.querySelector('.nav-toggle');
    var links  = document.getElementById('nav-links');
    if (toggle && links) {
      toggle.addEventListener('click', function () {
        var open = links.classList.toggle('open');
        toggle.setAttribute('aria-expanded', open);
      });
    }
  })();
</script>
