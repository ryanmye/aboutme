<nav class="site-nav" role="navigation" aria-label="Main navigation">
  <div class="container nav-inner">
    <a class="nav-brand" href="{{ '/' | relative_url }}">{{ site.author }}</a>

    <div class="nav-right">
      <div id="theme-toggle" class="theme-toggle" role="group" aria-label="Theme selector">
        <button type="button" class="theme-dot" data-theme="warm" title="Warm cream" aria-label="Warm cream theme" style="background:#C4785A"></button>
        <button type="button" class="theme-dot" data-theme="linen" title="Linen" aria-label="Linen theme" style="background:#5C4F43"></button>
        <button type="button" class="theme-dot" data-theme="pure" title="Pure" aria-label="Pure theme" style="background:#111111"></button>
        <button type="button" class="theme-dot" data-theme="barely" title="Barely dark" aria-label="Barely dark theme" style="background:#B89A7D"></button>
        <button type="button" class="theme-dot theme-dot-dark-mono" data-theme="dark-mono" title="Dark mono" aria-label="Dark mono theme" style="background:#E8E8E8"></button>
      </div>

      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-links">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="nav-links" id="nav-links" role="list">
      <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>about</a></li>
      <li><a href="{{ '/research' | relative_url }}"{% if page.url contains '/research' %} class="active"{% endif %}>research</a></li>
      <li><a href="{{ '/projects' | relative_url }}"{% if page.url contains '/projects' %} class="active"{% endif %}>projects</a></li>
      <li><a href="{{ '/blog' | relative_url }}"{% if page.url contains '/blog' %} class="active"{% endif %}>blog</a></li>
      <li><a href="{{ '/cv' | relative_url }}"{% if page.url contains '/cv' %} class="active"{% endif %}>cv</a></li>
    </ul>
    </div>
  </div>
</nav>

<script>
  (function () {
    var toggle = document.querySelector('.nav-toggle');
    var links  = document.getElementById('nav-links');
    if (toggle && links) {
      toggle.addEventListener('click', function () {
        var open = links.classList.toggle('open');
        toggle.setAttribute('aria-expanded', open);
      });
      document.addEventListener('click', function (e) {
        if (!links.classList.contains('open')) return;
        var themeToggle = document.getElementById('theme-toggle');
        if (links.contains(e.target) || toggle.contains(e.target) || (themeToggle && themeToggle.contains(e.target))) return;
        links.classList.remove('open');
        toggle.setAttribute('aria-expanded', 'false');
      });
    }
  })();
</script>
