title: "Ryan Ye"
description: "Computer Science student at Cornell University interested in machine learning, computer vision, and AI for scientific discovery."
author: "Ryan Ye"
email: "rmy43@cornell.edu"
github_username: "ryanmye"
linkedin_username: "rmy43"
url: "https://ryanmye.github.io"
baseurl: "/aboutme"
twitter_username: "ryanmye0"

theme: null

plugins:
  - jekyll-sitemap
  - jekyll-feed

markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

local_editor: true

# Image delivery configuration. `source` selects which backend renders image URLs;
# all template-level calls go through _includes/image_src.html.
#   local              - default, serves pre-generated thumbnails from assets/images/
#   cloudflare_r2      - serves from R2 object keys through a custom public domain
# R2 API sync scripts read credentials from env vars:
#   CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_R2_BUCKET, CLOUDFLARE_R2_ACCESS_KEY_ID,
#   CLOUDFLARE_R2_SECRET_ACCESS_KEY, CLOUDFLARE_R2_S3_ENDPOINT, CLOUDFLARE_R2_PUBLIC_BASE_URL
images:
  source: cloudflare_r2
  widths:
    thumb: 600
    med: 1600
  cloudflare:
    r2_public_base_url: "https://pub-ed4049e46db94fcf82ddec7b6550f05f.r2.dev"
    account_id: ""
    r2_bucket: ""
    r2_access_key_id: ""
    r2_secret_access_key: ""
    r2_s3_endpoint: ""

collections:
  albums:
    output: true
    permalink: /albums/:title/

exclude:
  - README.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "albums"
    values:
      layout: "album"
