title: "Ryan Ye"
description: "Computer Science student at Cornell University interested in machine learning, computer vision, and AI for scientific discovery."
author: "Ryan Ye"
email: "rmy43@cornell.edu"
github_username: "ryanmye"
linkedin_username: "rmy43"
url: "https://ryanmye.github.io"
baseurl: "/aboutme"
twitter_username: "ryanmye0"

theme: null

plugins:
  - jekyll-sitemap
  - jekyll-feed

markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

local_editor: true

# Image delivery configuration. `source` selects which backend renders image URLs;
# all template-level calls go through _includes/image_src.html.
#   local              - default, serves pre-generated thumbnails from assets/images/
#   cloudflare_resize  - rewrites URLs through a Cloudflare zone's /cdn-cgi/image/ prefix
#   cloudflare_images  - uses https://imagedelivery.net/<hash>/<id>/<variant> (requires cf_id in _data/image_meta.yml)
images:
  source: local
  widths:
    thumb: 600
    med: 1600
  cloudflare:
    account_hash: ""
    resize_prefix: "/cdn-cgi/image"

collections:
  albums:
    output: true
    permalink: /albums/:title/

exclude:
  - README.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "albums"
    values:
      layout: "album"
